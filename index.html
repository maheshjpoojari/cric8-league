<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 Elite Scorer</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
            authDomain: "cric8-league.firebaseapp.com",
            projectId: "cric8-league",
            storageBucket: "cric8-league.firebasestorage.app",
            messagingSenderId: "623659944427",
            appId: "1:623659944427:web:a4ad2da48833e6a4db31ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let matchId = "live_match_1";

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('adminControls').classList.toggle('hidden', !isAdmin);
        });

        window.login = async () => {
            const email = prompt("Email:");
            const pass = prompt("Password:");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); }
        };

        onSnapshot(doc(db, "matches", matchId), (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            const t = d.inn === 1 ? d.tA : d.tB;
            
            document.getElementById('teamNames').innerText = `${d.tA.name} vs ${d.tB.name}`;
            document.getElementById('mainScore').innerText = t.score;
            document.getElementById('subStats').innerText = `Overs: ${Math.floor(t.balls/6)}.${t.balls%6} | Wkts: ${t.wkts}`;
            
            const crr = t.balls > 0 ? (t.score / (t.balls/6)).toFixed(2) : "0.00";
            document.getElementById('crrBox').innerText = `CRR: ${crr}`;

            const logs = document.getElementById('logList');
            logs.innerHTML = (d.logs || []).slice(0, 5).map(l => `<li>${l}</li>`).join('');
        });

        window.addBall = async (runs) => {
            if (!isAdmin) return;
            const ref = doc(db, "matches", matchId);
            const snap = await getDoc(ref);
            const d = snap.data();
            const teamKey = d.inn === 1 ? 'tA' : 'tB';

            d[teamKey].score += runs;
            d[teamKey].balls += 1;
            d.logs = d.logs || [];
            d.logs.unshift(`Ovr ${Math.floor((d[teamKey].balls-1)/6)}.${(d[teamKey].balls-1)%6+1}: ${runs} Run(s)`);

            await setDoc(ref, d);
        };

        window.confirmWicket = async () => {
            if (!isAdmin) return;
            const ref = doc(db, "matches", matchId);
            const snap = await getDoc(ref);
            const d = snap.data();
            const teamKey = d.inn === 1 ? 'tA' : 'tB';

            d[teamKey].score -= 5;
            d[teamKey].wkts += 1;
            d[teamKey].balls += 1;
            d.logs = d.logs || [];
            d.logs.unshift(`WICKET! -5 Runs deducted`);

            await setDoc(ref, d);
            document.getElementById('wickModal').classList.add('hidden');
        };

        window.showWickModal = () => document.getElementById('wickModal').classList.remove('hidden');
        window.closeWickModal = () => document.getElementById('wickModal').classList.add('hidden');
    </script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .hidden { display: none; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #334155; text-align: center; margin-bottom: 15px; }
        .score-big { font-size: 5rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { border: none; border-radius: 10px; padding: 15px; font-weight: bold; color: white; background: #334155; cursor: pointer; }
        .btn-red { background: var(--danger); grid-column: span 2; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="card" style="border-color: var(--accent);">
        <div id="teamNames" style="font-size: 0.9rem; opacity: 0.8;">Loading Teams...</div>
        <div id="mainScore" class="score-big">0</div>
        <div id="subStats" style="font-weight: bold;">Overs: 0.0 | Wkts: 0</div>
        <div id="crrBox" style="color: #10b981; margin-top: 5px;">CRR: 0.00</div>
    </div>

    <div id="adminControls" class="card hidden">
        <div class="btn-grid">
            <button class="btn" onclick="addBall(0)">0</button>
            <button class="btn" onclick="addBall(1)">1</button>
            <button class="btn" onclick="addBall(2)">2</button>
            <button class="btn" onclick="addBall(3)">3</button>
            <button class="btn" onclick="addBall(4)">4</button>
            <button class="btn" onclick="addBall(6)">6</button>
            <button class="btn btn-red" onclick="showWickModal()">WICKET / OUT</button>
        </div>
    </div>

    <div class="card" style="text-align: left;">
        <h4 style="margin: 0 0 10px 0;">Live Timeline</h4>
        <ul id="logList" style="list-style: none; padding: 0; font-size: 0.8rem; color: #94a3b8;"></ul>
    </div>

    <button class="btn" style="width: 100%; opacity: 0.5;" onclick="login()">Referee Login</button>

    <div id="wickModal" class="modal hidden">
        <div class="card" style="width: 80%;">
            <h3>Confirm Wicket?</h3>
            <p>This will deduct 5 runs and add 1 ball to the over.</p>
            <button class="btn btn-red" style="width: 100%; margin-bottom: 10px;" onclick="confirmWicket()">CONFIRM (-5 RUNS)</button>
            <button class="btn" style="width: 100%;" onclick="closeWickModal()">CANCEL</button>
        </div>
    </div>

</body>
</html>
