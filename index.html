<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 Elite Pro Scorer</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
            authDomain: "cric8-league.firebaseapp.com",
            projectId: "cric8-league",
            storageBucket: "cric8-league.firebasestorage.app",
            messagingSenderId: "623659944427",
            appId: "1:623659944427:web:a4ad2da48833e6a4db31ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let isProcessing = false; 

        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('adminPanel').classList.toggle('hidden', !isAdmin);
        });

        window.login = async () => {
            const email = prompt("Referee Email:");
            const pass = prompt("Password:");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Login Failed"); }
        };

        onSnapshot(doc(db, "matches", "live_match_1"), (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            const t = d.inn === 1 ? d.tA : d.tB;
            
            // Player Display Logic
            document.getElementById('bat1').innerText = d.crr_bat || "Batter 1*";
            document.getElementById('bat2').innerText = d.non_bat || "Batter 2";
            document.getElementById('bowler').innerText = `Bowler: ${d.crr_bowl || "TBD"}`;
            
            // Score Display
            document.getElementById('mainScore').innerText = t.score;
            document.getElementById('stats').innerText = `Overs: ${Math.floor(t.balls/6)}.${t.balls%6} | Wkts: ${t.wkts}`;
            
            // Over Complete Prompt
            if(t.balls > 0 && t.balls % 6 === 0) {
                document.getElementById('overAlert').classList.remove('hidden');
            } else {
                document.getElementById('overAlert').classList.add('hidden');
            }

            const logs = document.getElementById('timeline');
            logs.innerHTML = (d.logs || []).slice(0, 5).map(l => `<li>${l}</li>`).join('');
        });

        window.handleAction = async (runs, isWicket = false) => {
            if (!isAdmin || isProcessing) return;
            isProcessing = true; 

            try {
                const ref = doc(db, "matches", "live_match_1");
                const snap = await getDoc(ref);
                const d = snap.data();
                const teamKey = d.inn === 1 ? 'tA' : 'tB';

                if (isWicket) {
                    d[teamKey].score -= 5;
                    d[teamKey].wkts += 1;
                    d[teamKey].balls += 1;
                    d.logs.unshift(`WICKET! (-5)`);
                    closeModal();
                } else {
                    d[teamKey].score += runs;
                    d[teamKey].balls += 1;
                    d.logs.unshift(`${runs} Run(s)`);
                }

                await updateDoc(ref, { 
                    [`${teamKey}.score`]: d[teamKey].score,
                    [`${teamKey}.wkts`]: d[teamKey].wkts,
                    [`${teamKey}.balls`]: d[teamKey].balls,
                    logs: d.logs
                });
            } catch (e) { console.error(e); }
            finally { isProcessing = false; }
        };

        window.changePlayers = async () => {
            const b1 = prompt("Striker Name:");
            const b2 = prompt("Non-Striker Name:");
            const bowl = prompt("New Bowler Name:");
            const ref = doc(db, "matches", "live_match_1");
            await updateDoc(ref, { crr_bat: b1, non_bat: b2, crr_bowl: bowl });
        };

        window.openModal = () => document.getElementById('wickModal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('wickModal').classList.add('hidden');
    </script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #38bdf8; --red: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        .player-bar { display: flex; justify-content: space-between; padding: 10px; font-size: 0.8rem; background: #0b121e; border-radius: 8px; margin-bottom: 10px; color: var(--blue); }
        .card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #334155; margin-bottom: 10px; }
        .score { font-size: 5.5rem; font-weight: 800; color: var(--blue); margin: 5px 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { border: none; background: #334155; color: white; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-red { background: var(--red); grid-column: span 3; margin-top: 5px; }
        .alert { color: #fbbf24; font-weight: bold; margin-bottom: 10px; font-size: 0.8rem; border: 1px dashed #fbbf24; padding: 5px; border-radius: 5px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="player-bar">
        <div><span id="bat1">Batter 1*</span> | <span id="bat2" style="opacity:0.6;">Batter 2</span></div>
        <div id="bowler">Bowler: TBD</div>
    </div>

    <div class="card">
        <div id="overAlert" class="alert hidden">OVER COMPLETE! TAP TO CHANGE BOWLER</div>
        <div id="mainScore" class="score">0</div>
        <div id="stats" style="font-weight: bold; opacity: 0.8;">Overs: 0.0 | Wkts: 0</div>
    </div>

    <div id="adminPanel" class="card hidden">
        <div class="btn-grid">
            <button class="btn" onclick="handleAction(0)">0</button>
            <button class="btn" onclick="handleAction(1)">1</button>
            <button class="btn" onclick="handleAction(2)">2</button>
            <button class="btn" onclick="handleAction(3)">3</button>
            <button class="btn" onclick="handleAction(4)">4</button>
            <button class="btn" onclick="handleAction(6)">6</button>
            <button class="btn btn-red" onclick="openModal()">WICKET / OUT</button>
        </div>
        <button class="btn" style="width: 100%; margin-top: 10px; background: #0ea5e9;" onclick="changePlayers()">CHANGE BATSMAN/BOWLER</button>
    </div>

    <div class="card" style="text-align: left;">
        <ul id="timeline" style="list-style: none; padding: 0; font-size: 0.8rem; color: #94a3b8;"></ul>
    </div>

    <button class="btn" style="width: 100%; background: transparent; opacity: 0.3;" onclick="login()">Referee Login</button>

    <div id="wickModal" class="modal hidden">
        <div class="card" style="width: 80%;">
            <h2 style="color: var(--red);">OUT!</h2>
            <p>Confirming this will deduct 5 runs.</p>
            <button class="btn btn-red" style="width: 100%;" onclick="handleAction(0, true)">CONFIRM (-5 RUNS)</button>
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

</body>
</html>
