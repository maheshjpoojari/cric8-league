<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 Elite Pro Scorer V4</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, addDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
            authDomain: "cric8-league.firebaseapp.com",
            projectId: "cric8-league",
            appId: "1:623659944427:web:a4ad2da48833e6a4db31ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let matchData = null;
        let isAdmin = false;

        onAuthStateChanged(auth, user => {
            isAdmin = !!user;
            document.getElementById('adminPanel').classList.toggle('hidden', !isAdmin);
        });

        onSnapshot(doc(db, "matches", "live_match_1"), snap => {
            if (!snap.exists()) return;
            matchData = snap.data();
            updateUI();
        });

        function updateUI() {
            const d = matchData;
            const team = d.inn === 1 ? d.tA : d.tB;
            const opp = d.inn === 1 ? d.tB : d.tA;

            document.getElementById('teamNameDisp').innerText = team.name || "Team A";
            document.getElementById('bowlNameDisp').innerText = `Bowler: ${d.crr_bowl || 'TBD'}`;

            const r1 = parseInt(d.crr_bat_runs) || 0;
            const r2 = parseInt(d.non_bat_runs) || 0;
            document.getElementById('bat1').innerText = `${d.crr_bat_name || 'Striker'}* (${r1})`;
            document.getElementById('bat2').innerText = `${d.non_bat_name || 'Non-Striker'} (${r2})`;

            document.getElementById('mainScore').innerText = team.score;
            const overs = `${Math.floor(team.balls / 6)}.${team.balls % 6}`;
            document.getElementById('stats').innerText = `Overs: ${overs} / 8.0 | Wkts: ${team.wkts}`;

            if(d.inn === 2) {
                document.getElementById('targetBox').classList.remove('hidden');
                const target = (parseInt(opp.score) || 0) + 1;
                document.getElementById('targetBox').innerHTML = `Target: ${target}<br><span style="font-size:0.8rem">Need ${target - team.score} from ${48 - team.balls} balls</span>`;
            } else {
                document.getElementById('targetBox').classList.add('hidden');
            }

            const tracker = document.getElementById('tracker');
            tracker.innerHTML = (d.curr_over || []).map(b => {
                let cls = 'bg-white';
                if(b === 'W' || b === '3D(-5)' || b === '1RB') cls = 'bg-red';
                if(b.toString().includes('N') || b.toString().includes('Wd')) cls = 'bg-yellow';
                return `<div class="ball ${cls}">${b}</div>`;
            }).join('');

            const isOverComplete = team.balls > 0 && team.balls % 6 === 0 && d.curr_over.length > 0;
            document.getElementById('nextOverBtn').classList.toggle('hidden', !isOverComplete);
            document.getElementById('mainControls').style.opacity = isOverComplete ? "0.2" : "1";
            document.getElementById('mainControls').style.pointerEvents = isOverComplete ? "none" : "auto";
        }

        // --- MATCH MANAGEMENT (ABORT / WALKOVER) ---

        async function archiveAndReset(status, winnerName = "No Result") {
            const historyRef = collection(db, "match_history");
            const liveRef = doc(db, "matches", "live_match_1");
            
            // 1. Save current data to history
            const archiveData = {
                ...matchData,
                match_status: status,
                winner: winnerName,
                timestamp: new Date().toISOString()
            };
            await addDoc(historyRef, archiveData);

            // 2. Reset Live Match for Next Game
            const resetData = {
                inn: 1,
                crr_bat_name: "Striker", crr_bat_runs: 0,
                non_bat_name: "Non-Striker", non_bat_runs: 0,
                crr_bowl: "TBD",
                curr_over: [],
                tA: { name: "Team 1", score: 0, balls: 0, wkts: 0 },
                tB: { name: "Team 2", score: 0, balls: 0, wkts: 0 },
                last_state: null
            };
            await setDoc(liveRef, resetData);
            alert(`Match ${status}. Board Reset for Next Match.`);
        }

        window.abortMatch = async () => {
            if(!confirm("ABORT MATCH? This will end the current game due to rain/conditions.")) return;
            await archiveAndReset("Aborted/Rain");
        };

        window.walkoverMatch = async () => {
            const winner = prompt("Which team gets the Walkover? (Enter Team Name)");
            if(!winner) return;
            await archiveAndReset("Walkover", winner);
        };

        // --- SCORING LOGIC ---
        window.handleAction = async (val, type) => {
            if (!isAdmin) return;
            const ref = doc(db, "matches", "live_match_1");
            const d = JSON.parse(JSON.stringify(matchData));
            const teamKey = d.inn === 1 ? 'tA' : 'tB';

            d.last_state = JSON.stringify(matchData);
            d.crr_bat_runs = parseInt(d.crr_bat_runs) || 0;
            d.non_bat_runs = parseInt(d.non_bat_runs) || 0;

            if (type === 'wide') {
                d[teamKey].score += (val + 1);
                if(val % 2 !== 0) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
                d.curr_over.push(val > 0 ? `Wd+${val}` : 'Wd');
            } 
            else if (type === 'noball') {
                d[teamKey].score += (val + 1);
                d.crr_bat_runs += val;
                if(val % 2 !== 0) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
                d.curr_over.push(val > 0 ? `N+${val}` : 'N');
            } 
            else if (type === 'wicket') {
                d[teamKey].score -= 5;
                d[teamKey].wkts += 1;
                d[teamKey].balls += 1;
                d.curr_over.push('W');
                d.crr_bat_name = "OUT"; d.crr_bat_runs = 0;
                closeModal('wickModal');
            } 
            else {
                d[teamKey].score += val;
                d[teamKey].balls += 1;
                if(type === 'run') { d.crr_bat_runs += val; d.curr_over.push(val); } 
                else { d.curr_over.push(`${val}RB`); }
                if([1, 3, 5].includes(val)) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
                
                const lastThree = d.curr_over.slice(-3);
                if(lastThree.length === 3 && lastThree.every(x => x === 0 || x === '0')) {
                    d[teamKey].score -= 5;
                    d.curr_over.push("3D(-5)");
                }
            }
            await updateDoc(ref, d);
        };

        window.startNextOver = async () => {
            const d = JSON.parse(JSON.stringify(matchData));
            d.curr_over = [];
            [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
            await updateDoc(doc(db, "matches", "live_match_1"), d);
        };

        window.manualSwap = async () => {
            const d = JSON.parse(JSON.stringify(matchData));
            [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
            await updateDoc(doc(db, "matches", "live_match_1"), d);
        };

        window.undoAction = async () => {
            if(!matchData.last_state) return alert("Nothing to undo!");
            await updateDoc(doc(db, "matches", "live_match_1"), JSON.parse(matchData.last_state));
        };

        window.login = async () => {
            const email = prompt("Email:"); const pass = prompt("Pass:");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Failed"); }
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>

    <style>
        :root { --bg: #0b1120; --card: #111827; --blue: #38bdf8; --gold: #fbbf24; --red: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; padding: 5px; color: var(--blue); font-weight: bold; font-size: 0.8rem; }
        .player-bar { display: grid; grid-template-columns: 1fr 1fr; background: var(--card); border-radius: 12px 12px 0 0; margin-top: 5px; border: 1px solid #1e293b; }
        .bat-card { padding: 15px 5px; text-align: center; font-weight: bold; color: #64748b; border-bottom: 3px solid transparent; }
        .striker-active { color: var(--gold); border-bottom-color: var(--gold); }
        .score-card { background: var(--card); border: 1px solid #1e293b; border-radius: 0 0 15px 15px; padding: 25px 10px; text-align: center; margin-bottom: 15px; }
        .main-score { font-size: 6rem; font-weight: 900; color: var(--blue); margin: 0; line-height: 1; }
        .ball-row { display: flex; justify-content: center; gap: 6px; margin-top: 20px; flex-wrap: wrap; min-height: 35px; }
        .ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; font-size: 0.7rem; }
        .bg-white { background: #fff; } .bg-red { background: var(--red); color: #fff; } .bg-yellow { background: var(--gold); }
        .next-over-btn { color: var(--gold); font-weight: bold; margin-top: 15px; cursor: pointer; animation: blink 1s infinite; text-decoration: underline; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .admin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { border: none; background: #1e293b; color: #fff; padding: 18px 0; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
        .btn-blue { background: #0ea5e9; } .btn-orange { background: #f97316; } .btn-red { background: var(--red); grid-column: span 4; }
        .emergency-tools { grid-column: span 4; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        .btn-util { background: #334155; font-size: 0.7rem; padding: 12px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="teamNameDisp">Loading...</div>
        <div id="bowlNameDisp">Bowler: TBD</div>
    </div>

    <div class="player-bar">
        <div id="bat1" class="bat-card striker-active" onclick="manualSwap()">P1* (0)</div>
        <div id="bat2" class="bat-card" onclick="manualSwap()">P2 (0)</div>
    </div>

    <div class="score-card">
        <div id="targetBox" class="hidden" style="color: var(--gold); font-weight: bold; margin-bottom: 10px;"></div>
        <div id="mainScore" class="main-score">0</div>
        <div id="stats" style="color:#94a3b8; font-weight:bold;">Overs: 0.0 / 8.0 | Wkts: 0</div>
        <div id="tracker" class="ball-row"></div>
        <div id="nextOverBtn" class="next-over-btn hidden" onclick="startNextOver()">TAP HERE TO START NEXT OVER</div>
    </div>

    <div id="adminPanel" class="hidden">
        <div id="mainControls" class="admin-grid">
            <button class="btn" onclick="handleAction(0, 'run')">0</button>
            <button class="btn" onclick="handleAction(1, 'run')">1</button>
            <button class="btn" onclick="handleAction(2, 'run')">2</button>
            <button class="btn" onclick="handleAction(3, 'run')">3</button>
            <button class="btn" onclick="handleAction(4, 'run')">4</button>
            <button class="btn" onclick="handleAction(5, 'run')">5</button>
            <button class="btn" onclick="handleAction(6, 'run')">6</button>
            <button class="btn" style="background:#475569" onclick="handleAction(1, 'rb')">1RB</button>

            <button class="btn btn-blue" onclick="handleAction(0, 'wide')">WD</button>
            <button class="btn btn-blue" onclick="handleAction(1, 'wide')">WD+1</button>
            <button class="btn btn-orange" onclick="handleAction(0, 'noball')">NB</button>
            <button class="btn btn-orange" onclick="handleAction(1, 'noball')">NB+1</button>

            <button class="btn btn-red" onclick="document.getElementById('wickModal').classList.remove('hidden')">WICKET / OUT (-5)</button>
            
            <div class="emergency-tools">
                <button class="btn btn-util" onclick="undoAction()">UNDO LAST</button>
                <button class="btn btn-util" onclick="manualSwap()">SWAP STRIKE</button>
                <button class="btn btn-util" style="color: var(--red);" onclick="abortMatch()">ABORT MATCH (RAIN)</button>
                <button class="btn btn-util" style="color: var(--gold);" onclick="walkoverMatch()">WALKOVER</button>
            </div>
        </div>
    </div>

    <button onclick="login()" style="width:100%; background:transparent; border:none; color:#334155; margin-top:30px; font-size: 0.7rem;">Referee Security Access</button>

    <div id="wickModal" class="modal hidden">
        <div class="score-card" style="width: 100%; border-color: var(--red);">
            <h2 style="color: var(--red);">CONFIRM OUT?</h2>
            <button class="btn btn-red" style="width:100%;" onclick="handleAction(0, 'wicket')">YES, WICKET (-5)</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#334155;" onclick="closeModal('wickModal')">CANCEL</button>
        </div>
    </div>

</body>
</html>
