<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 League Pro 2026</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- 1. FIREBASE CONFIGURATION ---
        const // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
  authDomain: "cric8-league.firebaseapp.com",
  projectId: "cric8-league",
  storageBucket: "cric8-league.firebasestorage.app",
  messagingSenderId: "623659944427",
  appId: "1:623659944427:web:a4ad2da48833e6a4db31ae",
  measurementId: "G-8809SJ0RK4"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 2. APP STATE ---
        let isAdmin = false;
        let matchId = "live_match_1"; 

        // --- 3. CORE FUNCTIONS ---

        // Login Logic
        window.login = async () => {
            const email = prompt("Referee Email:");
            const pass = prompt("Password:");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("Login Successful!");
            } catch (e) { alert("Error: " + e.message); }
        };

        window.logout = () => signOut(auth);

        // Role Management
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !isAdmin));
        });

        // Real-time Score Sync
        onSnapshot(doc(db, "matches", matchId), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                const team = data.inn === 1 ? data.tA : data.tB;
                
                document.getElementById('displayMatch').innerText = `${data.tA.name} vs ${data.tB.name}`;
                document.getElementById('displayScore').innerText = `${team.score} - ${team.wkts}`;
                document.getElementById('displayOvers').innerText = `Overs: ${Math.floor(team.balls/6)}.${team.balls%6} / 8.0`;
                
                const crr = team.balls > 0 ? (team.score / (team.balls/6)).toFixed(2) : "0.00";
                document.getElementById('displayCRR').innerText = `CRR: ${crr}`;
                
                const logList = document.getElementById('displayLogs');
                logList.innerHTML = data.logs.slice(0, 8).map(l => `<li>${l}</li>`).join('');
            }
        });

        // Scoring Logic
        window.updateScore = async (runs) => {
            if(!isAdmin) return;
            const ref = doc(db, "matches", matchId);
            const snap = await getDoc(ref);
            let data = snap.data();
            let current = data.inn === 1 ? data.tA : data.tB;

            current.score += runs;
            current.balls += 1;
            data.logs.unshift(`Ovr ${Math.floor((current.balls-1)/6)}.${(current.balls-1)%6+1}: ${runs} Run(s)`);

            await setDoc(ref, data);
        };

        window.addWicket = async () => {
            if(!isAdmin) return;
            const type = document.getElementById('wicketType').value;
            const ref = doc(db, "matches", matchId);
            const snap = await getDoc(ref);
            let data = snap.data();
            let current = data.inn === 1 ? data.tA : data.tB;

            current.score -= 5;
            current.wkts += 1;
            current.balls += 1;
            data.logs.unshift(`WICKET! (${type}) -5 Runs`);

            await setDoc(ref, data);
            document.getElementById('wicketModal').classList.add('hidden');
        };

        window.switchInnings = async () => {
            if(!confirm("Change to 2nd Innings?")) return;
            const ref = doc(db, "matches", matchId);
            await updateDoc(ref, { inn: 2 });
        };

        // Navigation
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

    </script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #10b981; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; color: white; width: 100%; margin: 5px 0; }
        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid #334155; }
        .score-box { text-align: center; font-size: 3rem; font-weight: 900; margin: 10px 0; }
        ul { list-style: none; padding: 0; font-size: 0.85rem; color: #94a3b8; }
        li { padding: 5px 0; border-bottom: 1px solid #334155; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="screenHome" class="screen">
        <h2 style="text-align: center; color: var(--accent);">CRIC-8 ELITE</h2>
        <div class="card">
            <button class="btn btn-blue" onclick="showScreen('screenLive')">📡 LIVE SCORE</button>
            <button class="btn btn-outline" onclick="showScreen('screenRules')">📖 RULEBOOK</button>
            <button class="btn btn-outline admin-only hidden" onclick="logout()">LOGOUT</button>
            <button class="btn btn-red admin-only hidden" onclick="switchInnings()">SWITCH INNINGS</button>
            <button class="btn btn-outline" onclick="login()">REFEREE LOGIN</button>
        </div>
    </div>

    <div id="screenLive" class="screen hidden">
        <div class="card" style="text-align: center;">
            <div id="displayMatch" style="font-weight: bold; color: var(--accent);">Loading...</div>
            <div class="score-box" id="displayScore">0 - 0</div>
            <div id="displayOvers">Overs: 0.0</div>
            <div id="displayCRR" style="color: var(--success); font-weight: bold; margin-top: 5px;">CRR: 0.00</div>
        </div>

        <div class="card admin-only hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <button class="btn btn-outline" onclick="updateScore(0)">0</button>
                <button class="btn btn-outline" onclick="updateScore(1)">1</button>
                <button class="btn btn-outline" onclick="updateScore(4)">4</button>
                <button class="btn btn-outline" onclick="updateScore(6)">6</button>
                <button class="btn btn-red" onclick="document.getElementById('wicketModal').classList.remove('hidden')">OUT</button>
            </div>
        </div>

        <div class="card">
            <h4>Live Timeline</h4>
            <ul id="displayLogs"></ul>
        </div>
        <button class="btn btn-outline" onclick="showScreen('screenHome')">BACK</button>
    </div>

    <div id="screenRules" class="screen hidden">
        <div class="card">
            <h3>League Rulebook</h3>
            <p><b>• Wickets:</b> -5 Runs deduction per wicket.</p>
            <p><b>• 3-Dot Rule:</b> 3 consecutive dots = Batsman OUT.</p>
            <p><b>• Format:</b> 8 Overs per innings.</p>
            <button class="btn btn-outline" onclick="showScreen('screenHome')">BACK</button>
        </div>
    </div>

    <div id="wicketModal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:100;">
        <div class="card" style="width:80%;">
            <h3>Dismissal Type</h3>
            <select id="wicketType">
                <option>Bowled</option>
                <option>Caught</option>
                <option>Run Out</option>
                <option>3-Dot Rule</option>
            </select>
            <button class="btn btn-red" onclick="addWicket()">CONFIRM OUT</button>
            <button class="btn btn-outline" onclick="document.getElementById('wicketModal').classList.add('hidden')">CANCEL</button>
        </div>
    </div>

</body>
</html>
