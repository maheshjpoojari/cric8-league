<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 Scorer</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
            authDomain: "cric8-league.firebaseapp.com",
            projectId: "cric8-league",
            appId: "1:623659944427:web:a4ad2da48833e6a4db31ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let matchData = null;
        let isAdmin = false;

        onAuthStateChanged(auth, user => {
            isAdmin = !!user;
            document.getElementById('adminPanel').classList.toggle('hidden', !isAdmin);
        });

        onSnapshot(doc(db, "matches", "live_match_1"), snap => {
            if (!snap.exists()) return;
            matchData = snap.data();
            updateUI();
        });

        function updateUI() {
            const d = matchData;
            const team = d.inn === 1 ? d.tA : d.tB;
            const opp = d.inn === 1 ? d.tB : d.tA;

            // 1. Header UI (Matches your exact screenshots)
            document.getElementById('teamNameDisp').innerText = team.name || "Team 1";
            document.getElementById('bowlNameDisp').innerText = `Bowler: ${d.crr_bowl || 'TBD'}`;

            // 2. Batter Stats & Strike Highlight
            const b1 = document.getElementById('bat1');
            const b2 = document.getElementById('bat2');
            
            b1.innerText = `${d.crr_bat_name || 'P1'}* (${d.crr_bat_runs || 0})`;
            b2.innerText = `${d.non_bat_name || 'P2'} (${d.non_bat_runs || 0})`;

            // 3. Main Scoreboard
            document.getElementById('mainScore').innerText = team.score;
            const overs = `${Math.floor(team.balls / 6)}.${team.balls % 6}`;
            document.getElementById('stats').innerText = `Overs: ${overs} / 8.0 | Wkts: ${team.wkts}`;

            // Target Chasing UI
            if(d.inn === 2) {
                document.getElementById('targetBox').classList.remove('hidden');
                const target = (opp.score || 0) + 1;
                document.getElementById('targetBox').innerHTML = `Target: ${target}<br><span style="font-size:0.9rem">Need ${target - team.score} from ${48 - team.balls} balls</span>`;
            }

            // 4. Ball Tracker & Over Completion Logic
            const tracker = document.getElementById('tracker');
            tracker.innerHTML = (d.curr_over || []).map(b => {
                let cls = (b === 'W' || b === '3D(-5)' || b.toString().includes('N') || b.toString().includes('Wd') || b === '1RB') ? 'bg-red' : 'bg-white';
                if(b.toString().includes('Wd') || b.toString().includes('N')) cls = 'bg-yellow'; // Custom color for extras based on your SS
                return `<div class="ball ${cls}">${b}</div>`;
            }).join('');

            const isOverComplete = team.balls > 0 && team.balls % 6 === 0 && d.curr_over.length > 0;
            document.getElementById('nextOverBtn').classList.toggle('hidden', !isOverComplete);
            document.getElementById('mainControls').style.opacity = isOverComplete ? "0.3" : "1";
            document.getElementById('mainControls').style.pointerEvents = isOverComplete ? "none" : "auto";
        }

        // --- MANUAL STRIKE SWAP ---
        window.manualSwap = async () => {
            if(!isAdmin) return;
            const ref = doc(db, "matches", "live_match_1");
            const d = { ...matchData };
            
            // Backup for Undo
            d.last_state = JSON.stringify(matchData);
            
            // Swap logic
            const tempName = d.crr_bat_name;
            const tempRuns = d.crr_bat_runs;
            d.crr_bat_name = d.non_bat_name;
            d.crr_bat_runs = d.non_bat_runs;
            d.non_bat_name = tempName;
            d.non_bat_runs = tempRuns;

            await updateDoc(ref, d);
        };

        // --- CORE LOGIC FIX ---
        window.handleAction = async (val, type) => {
            if (!isAdmin) return;
            const ref = doc(db, "matches", "live_match_1");
            const d = JSON.parse(JSON.stringify(matchData));
            const teamKey = d.inn === 1 ? 'tA' : 'tB';

            // Create Undo Snapshot
            d.last_state = JSON.stringify(matchData);

            if (type === 'wide') {
                d[teamKey].score += (val + 1); // 1 penalty + runs
                if(val > 0) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs]; // Swap on odd extra runs
                d.curr_over.push(val > 0 ? `Wd+${val}` : 'WD');
                // No balls added
            } 
            else if (type === 'noball') {
                d[teamKey].score += (val + 1); // 1 penalty + runs
                d.crr_bat_runs += val; // Credit batter for runs hit off No Ball
                if(val % 2 !== 0) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
                d.curr_over.push(val > 0 ? `N+${val}` : 'N');
                // No balls added
            } 
            else if (type === 'wicket') {
                d[teamKey].score -= 5;
                d[teamKey].wkts += 1;
                d[teamKey].balls += 1;
                d.curr_over.push('W');
                d.crr_bat_name = ''; d.crr_bat_runs = 0; // Clear striker
                closeModal('wickModal');
            } 
            else {
                // Runs or Leg Byes (1RB)
                d[teamKey].score += val;
                d[teamKey].balls += 1;
                
                if(type === 'run') {
                    d.crr_bat_runs += val;
                    d.curr_over.push(val);
                } else {
                    d.curr_over.push(`${val}RB`); // Leg byes don't credit batter
                }
                
                // Swap on odd
                if([1, 3, 5].includes(val)) [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];

                // 3-Dot Penalty
                const dots = d.curr_over.filter(x => x === 0 || x === '0');
                if(dots.length >= 3 && d.curr_over.slice(-3).every(x => x === 0 || x === '0')) {
                    d[teamKey].score -= 5;
                    d.curr_over.push("3D(-5)");
                }
            }

            await updateDoc(ref, d);
        };

        window.startNextOver = async () => {
            const ref = doc(db, "matches", "live_match_1");
            const d = JSON.parse(JSON.stringify(matchData));
            d.last_state = JSON.stringify(matchData); // Save undo state before clearing
            
            d.curr_over = []; // Clear tracker
            // Auto swap strike at end of over
            [d.crr_bat_name, d.crr_bat_runs, d.non_bat_name, d.non_bat_runs] = [d.non_bat_name, d.non_bat_runs, d.crr_bat_name, d.crr_bat_runs];
            
            await updateDoc(ref, d);
        };

        window.undoAction = async () => {
            if(!matchData.last_state) return alert("Nothing to undo!");
            const ref = doc(db, "matches", "live_match_1");
            await updateDoc(ref, JSON.parse(matchData.last_state));
        };

        window.login = async () => {
            const email = prompt("Email:"); const pass = prompt("Pass:");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Auth Failed"); }
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>

    <style>
        :root { --bg: #0b1120; --card: #111827; --blue: #38bdf8; --gold: #fbbf24; --red: #ef4444; --btn: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        /* Top Header */
        .header { display: flex; justify-content: space-between; color: var(--blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; padding: 0 5px; }
        
        /* Interactive Player Bar */
        .player-bar { display: grid; grid-template-columns: 1fr 1fr; background: var(--card); border-radius: 8px 8px 0 0; padding: 15px 10px 0 10px; }
        .bat-card { padding: 10px; text-align: center; font-weight: bold; cursor: pointer; color: #94a3b8; border-bottom: 2px solid transparent; }
        .striker-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        
        /* Main Score Area */
        .score-card { background: var(--card); border: 1px solid var(--gold); border-radius: 0 0 15px 15px; padding: 20px 10px; text-align: center; margin-bottom: 15px; position: relative; }
        .main-score { font-size: 6rem; font-weight: 900; color: var(--blue); line-height: 1; margin: 0; }
        .stats { font-weight: bold; color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
        
        /* Tracker */
        .ball-row { display: flex; justify-content: center; gap: 8px; margin-top: 15px; min-height: 32px; flex-wrap: wrap; }
        .ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 0.7rem; background: #fff; }
        .bg-red { background: var(--red); color: #fff; }
        .bg-yellow { background: var(--gold); color: #000; }
        
        /* Next Over Prompt */
        .next-over-text { color: var(--gold); font-weight: bold; font-size: 0.8rem; margin-top: 10px; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Numpad */
        .admin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; transition: 0.3s; }
        .btn { border: none; background: var(--btn); color: #fff; padding: 18px 0; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-blue { background: #0ea5e9; }
        .btn-orange { background: #f97316; }
        .btn-red { background: var(--red); grid-column: span 4; }
        .btn-dark { background: #334155; grid-column: span 4; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="teamNameDisp">Team 1</div>
        <div id="bowlNameDisp">Bowler: TBD</div>
    </div>

    <div class="player-bar">
        <div id="bat1" class="bat-card striker-active" onclick="manualSwap()">P1* (0)</div>
        <div id="bat2" class="bat-card" onclick="manualSwap()">P2 (0)</div>
    </div>

    <div class="score-card">
        <div id="targetBox" class="hidden" style="color: var(--gold); font-weight: bold; margin-bottom: 10px;"></div>
        <div id="mainScore" class="main-score">0</div>
        <div id="stats" class="stats">Overs: 0.0 / 8.0 | Wkts: 0</div>
        <div id="tracker" class="ball-row"></div>
        <div id="nextOverBtn" class="next-over-text hidden" onclick="startNextOver()">TAP TO START NEXT OVER</div>
    </div>

    <div id="adminPanel" class="hidden">
        <div id="mainControls" class="admin-grid">
            <button class="btn" onclick="handleAction(0, 'run')">0</button>
            <button class="btn" onclick="handleAction(1, 'run')">1</button>
            <button class="btn" onclick="handleAction(2, 'run')">2</button>
            <button class="btn" onclick="handleAction(3, 'run')">3</button>
            <button class="btn" onclick="handleAction(4, 'run')">4</button>
            <button class="btn" onclick="handleAction(5, 'run')">5</button>
            <button class="btn" onclick="handleAction(6, 'run')">6</button>
            <button class="btn" style="background:#475569" onclick="handleAction(1, 'rb')">1RB</button>

            <button class="btn btn-blue" onclick="handleAction(0, 'wide')">WD</button>
            <button class="btn btn-blue" onclick="handleAction(1, 'wide')">WD+1</button>
            <button class="btn btn-orange" onclick="handleAction(0, 'noball')">NB</button>
            <button class="btn btn-orange" onclick="handleAction(1, 'noball')">NB+1</button>

            <button class="btn btn-red" onclick="document.getElementById('wickModal').classList.remove('hidden')">WICKET / OUT (-5)</button>
            <button class="btn btn-dark" onclick="undoAction()">UNDO LAST ACTION</button>
        </div>
    </div>

    <button onclick="login()" style="width:100%; background:transparent; border:none; color:#475569; margin-top:20px; font-size: 0.8rem;">Referee Login</button>

    <div id="wickModal" class="modal hidden">
        <div class="score-card" style="width: 90%; border-color: var(--red);">
            <h2 style="color: var(--red);">OUT!</h2>
            <button class="btn btn-red" style="width:100%; margin-bottom:10px;" onclick="handleAction(0, 'wicket')">CONFIRM OUT (-5)</button>
            <button class="btn btn-dark" style="width:100%;" onclick="closeModal('wickModal')">CANCEL</button>
        </div>
    </div>

</body>
</html>
