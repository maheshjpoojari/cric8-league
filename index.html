<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cric-8 Elite | Final Pro Scorer Cloud</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. YOUR VERIFIED CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyAbjxVu29ub-BKCNm7tMk2nl0ibQHkm7iE",
            authDomain: "cric8-league.firebaseapp.com",
            projectId: "cric8-league",
            storageBucket: "cric8-league.firebasestorage.app",
            messagingSenderId: "623659944427",
            appId: "1:623659944427:web:a4ad2da48833e6a4db31ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let isProcessing = false; 

        // 2. AUTHENTICATION LOGIC
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.getElementById('adminPanel').classList.toggle('hidden', !isAdmin);
            document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
        });

        window.login = async () => {
            const email = prompt("Referee Email:");
            const pass = prompt("Password:");
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("Login Failed: " + e.message); }
        };

        window.logout = () => signOut(auth);

        // 3. REAL-TIME DATA SYNC
        onSnapshot(doc(db, "matches", "live_match_1"), (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            const isFirstInn = d.inn === 1;
            const t = isFirstInn ? d.tA : d.tB;
            const otherTeam = isFirstInn ? d.tB : d.tA;
            
            // Header & Basic Stats
            document.getElementById('headerStatus').innerText = `${t.name} - ${isFirstInn ? 'BAT' : 'CHASE'}`;
            document.getElementById('mainScore').innerText = t.score;
            document.getElementById('wickets').innerText = t.wkts;
            document.getElementById('overs').innerText = `${Math.floor(t.balls/6)}.${t.balls%6}`;
            
            // Chasing Logic (From your BRD)
            const targetUI = document.getElementById('targetBox');
            if (!isFirstInn) {
                targetUI.classList.remove('hidden');
                const target = (otherTeam.score || 0) + 1;
                const needed = target - t.score;
                const ballsLeft = 48 - t.balls;
                document.getElementById('targetValue').innerText = `Target: ${target}`;
                document.getElementById('needValue').innerText = `Need ${needed} from ${ballsLeft} balls`;
            } else {
                targetUI.classList.add('hidden');
            }

            // Timeline
            const logs = document.getElementById('timeline');
            logs.innerHTML = (d.logs || []).slice(0, 5).map(l => `<li>${l}</li>`).join('');
        });

        // 4. CORE SCORING (ANTI-GLITCH)
        window.handleAction = async (runs, isWicket = false) => {
            if (!isAdmin || isProcessing) return;
            isProcessing = true; // LOCK BUTTONS

            try {
                const ref = doc(db, "matches", "live_match_1");
                const snap = await getDoc(ref);
                const d = snap.data();
                const teamKey = d.inn === 1 ? 'tA' : 'tB';

                d.logs = d.logs || []; // Safety check for array

                if (isWicket) {
                    d[teamKey].score -= 5;
                    d[teamKey].wkts += 1;
                    d[teamKey].balls += 1;
                    d.logs.unshift(`WICKET! (-5 Runs) | Ovr ${Math.floor(d[teamKey].balls/6)}.${d[teamKey].balls%6}`);
                    closeModal();
                } else {
                    d[teamKey].score += runs;
                    d[teamKey].balls += 1;
                    d.logs.unshift(`${runs} Run(s) | Ovr ${Math.floor((d[teamKey].balls-1)/6)}.${(d[teamKey].balls-1)%6+1}`);
                }

                await updateDoc(ref, { 
                    [`${teamKey}.score`]: d[teamKey].score,
                    [`${teamKey}.wkts`]: d[teamKey].wkts,
                    [`${teamKey}.balls`]: d[teamKey].balls,
                    logs: d.logs
                });

            } catch (e) { alert("Sync Error: Check Connection"); }
            finally { isProcessing = false; } // UNLOCK BUTTONS
        };

        window.openModal = () => document.getElementById('wickModal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('wickModal').classList.add('hidden');
    </script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --gold: #fbbf24; --red: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; position: relative; text-align: center; }
        .target-box { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); border-radius: 10px; padding: 10px; margin-bottom: 10px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .score-hero { font-size: 6rem; font-weight: 900; color: var(--accent); line-height: 1; margin: 10px 0; }
        .stats-row { display: flex; justify-content: space-around; font-weight: bold; color: #94a3b8; border-top: 1px solid #334155; padding-top: 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { border: none; background: #334155; color: white; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #475569; }
        .btn-wick { background: var(--red); grid-column: span 3; margin-top: 5px; text-transform: uppercase; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #timeline { list-style: none; padding: 0; text-align: left; }
        #timeline li { padding: 8px 0; border-bottom: 1px solid #2d3a4f; font-size: 0.85rem; color: #cbd5e1; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 15px;">
        <h2 style="margin: 0; color: var(--accent); letter-spacing: 2px;">CRIC-8 ELITE</h2>
        <div id="headerStatus" style="font-size: 0.8rem; opacity: 0.6; font-weight: bold;">SYNCING...</div>
    </div>

    <div class="card">
        <div id="targetBox" class="target-box hidden">
            <span id="targetValue">Target: 0</span> • <span id="needValue">Need 0 from 0 balls</span>
        </div>
        <div id="mainScore" class="score-hero">0</div>
        <div class="stats-row">
            <div>WKTS: <span id="wickets" style="color: white;">0</span></div>
            <div>OVERS: <span id="overs" style="color: white;">0.0</span> <span style="font-size: 0.7rem; opacity: 0.5;">/ 8.0</span></div>
        </div>
    </div>

    <div id="adminPanel" class="card hidden">
        <div class="btn-grid">
            <button class="btn" onclick="handleAction(0)">0</button>
            <button class="btn" onclick="handleAction(1)">1</button>
            <button class="btn" onclick="handleAction(2)">2</button>
            <button class="btn" onclick="handleAction(3)">3</button>
            <button class="btn" onclick="handleAction(4)">4</button>
            <button class="btn" onclick="handleAction(6)">6</button>
            <button class="btn btn-wick" onclick="openModal()">WICKET / RUNOUT / MANKAD</button>
        </div>
    </div>

    <div class="card" style="text-align: left; min-height: 150px;">
        <div style="font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px;">LIVE TIMELINE</div>
        <ul id="timeline"></ul>
    </div>

    <div style="display: flex; gap: 10px;">
        <button id="loginBtn" class="btn" style="flex: 1; background: transparent; color: #4b5563; font-size: 0.8rem;" onclick="login()">Referee Login</button>
        <button id="logoutBtn" class="btn hidden" style="flex: 1; background: transparent; color: var(--red); font-size: 0.8rem;" onclick="logout()">Logout</button>
    </div>

    <div id="wickModal" class="modal hidden">
        <div class="card" style="width: 85%; border: 2px solid var(--red);">
            <h2 style="color: var(--red); margin-top: 0;">OUT!</h2>
            <p style="font-size: 0.9rem; color: #94a3b8;">Confirming this will deduct 5 runs and count as a ball delivered.</p>
            <button class="btn btn-wick" style="width: 100%;" onclick="handleAction(0, true)">CONFIRM (-5 RUNS)</button>
            <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; border: 1px solid #334155;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

</body>
</html>
